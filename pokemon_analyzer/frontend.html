<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Pokémon Type Analyzer ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* (mesmo CSS que você já tem, mantenha igual) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #e53935, #b71c1c);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 3px solid #fdd835;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #fdd835;
            font-size: 1rem;
            text-shadow: 2px 2px 0 #b71c1c;
        }
        .header p {
            color: white;
            font-size: 0.5rem;
            margin-top: 10px;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: rgba(30, 42, 69, 0.95);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #fdd835;
        }
        .card-title {
            color: #fdd835;
            font-size: 0.6rem;
            margin-bottom: 15px;
            text-align: center;
        }
        .team-container {
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
        }
        .team-pokemon {
            background: #0f3460;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #fdd835;
        }
        .team-pokemon-sprite {
            width: 50px;
            height: 50px;
            background: #1e2a45;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .team-pokemon-sprite img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .team-pokemon-info {
            flex: 1;
        }
        .team-pokemon-name {
            color: #fdd835;
            font-size: 0.5rem;
            margin-bottom: 5px;
        }
        .team-pokemon-types {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .type-badge {
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.4rem;
            color: white;
        }
        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
        }
        .remove-btn:hover {
            background: #c82333;
        }
        .pokedex-container {
            max-height: 400px;
            overflow-y: auto;
        }
        .search-box {
            margin-bottom: 15px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #fdd835;
            border-radius: 10px;
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
        }
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 100%;
            overflow-y: auto;
        }
        .pokedex-item {
            background: #0f3460;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #fdd835;
            transition: all 0.3s;
        }
        .pokedex-item:hover {
            transform: scale(1.05);
            background: #1e2a45;
            border-color: #ff9800;
        }
        .pokedex-item-sprite {
            width: 60px;
            height: 60px;
            margin: 0 auto;
        }
        .pokedex-item-sprite img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .pokedex-item-name {
            color: #fdd835;
            font-size: 0.4rem;
            margin-top: 5px;
            text-transform: capitalize;
        }
        .pokedex-item-types {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            flex: 1;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .analyze-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .results {
            background: rgba(30, 42, 69, 0.95);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #fdd835;
            max-height: 600px;
            overflow-y: auto;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #fdd835;
            font-size: 0.5rem;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            font-size: 0.5rem;
        }
        .coverage-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .coverage-score {
            font-size: 2rem;
            color: #fdd835;
        }
        .coverage-bar {
            background: rgba(0,0,0,0.3);
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .coverage-fill {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            height: 100%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.5rem;
        }
        .pokemon-result {
            background: #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .pokemon-result-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .pokemon-result-sprite {
            width: 60px;
            height: 60px;
        }
        .pokemon-result-sprite img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .damage-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .suggestion-card {
            background: linear-gradient(135deg, #fa709a, #fee140);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .t-normal { background: #A8A878; }
        .t-fire { background: #F08030; }
        .t-water { background: #6890F0; }
        .t-electric { background: #F8D030; color: black; }
        .t-grass { background: #78C850; }
        .t-ice { background: #98D8D8; color: black; }
        .t-fighting { background: #C03028; }
        .t-poison { background: #A040A0; }
        .t-ground { background: #E0C068; color: black; }
        .t-flying { background: #A890F0; }
        .t-psychic { background: #F85888; }
        .t-bug { background: #A8B820; }
        .t-rock { background: #B8A038; }
        .t-ghost { background: #705898; }
        .t-dragon { background: #7038F8; }
        .t-dark { background: #705848; }
        .t-steel { background: #B8B8D0; color: black; }
        .t-fairy { background: #EE99AC; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ POKEMON TYPE ANALYZER ⚡</h1>
            <p>Clique nos Pokemon da Pokedex para montar seu time (max 6)</p>
        </div>

        <div class="two-columns">
            <!-- SEU TIME -->
            <div class="card">
                <div class="card-title">🎯 SEU TIME</div>
                <div id="teamContainer" class="team-container">
                    <div class="loading">Nenhum Pokemon no time</div>
                </div>
                <div class="button-group">
                    <button id="clearTeamBtn" class="btn">🗑️ LIMPAR</button>
                    <button id="analyzeBtn" class="btn analyze-btn">🔍 ANALISAR</button>
                </div>
            </div>

            <!-- POKEDEX DINÂMICA -->
            <div class="card">
                <div class="card-title">📖 POKEDEX</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="BUSCAR POKEMON...">
                </div>
                <div id="pokedexContainer" class="pokedex-container">
                    <div class="loading">Carregando Pokédex...</div>
                </div>
            </div>
        </div>

        <!-- RESULTADOS -->
        <div id="results" class="results">
            <div class="loading">✨ CLIQUE EM ANALISAR PARA VER OS RESULTADOS ✨</div>
        </div>
    </div>

    <script>
        // Cache de detalhes dos Pokémon (tipos e sprite)
        const pokemonCache = new Map();
        let allPokemonNames = [];    // lista de nomes (string)
        let filteredPokemonNames = [];
        let isLoading = false;
        let currentPage = 0;
        const PAGE_SIZE = 50;         // número de itens carregados por vez (scroll infinito)
        let currentFilter = '';

        // Elementos DOM
        const pokedexContainer = document.getElementById('pokedexContainer');
        const searchInput = document.getElementById('searchInput');
        const teamContainer = document.getElementById('teamContainer');
        const resultsDiv = document.getElementById('results');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearTeamBtn = document.getElementById('clearTeamBtn');

        let team = [];  // time atual

        // Função para buscar a lista completa de Pokémon da PokeAPI
        async function loadPokemonList() {
            try {
                pokedexContainer.innerHTML = '<div class="loading">Carregando Pokédex...</div>';
                const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=10000');
                const data = await response.json();
                allPokemonNames = data.results.map(p => p.name);
                filteredPokemonNames = [...allPokemonNames];
                currentPage = 0;
                renderPokedex();
            } catch (error) {
                pokedexContainer.innerHTML = `<div class="error">Erro ao carregar Pokédex: ${error.message}</div>`;
            }
        }

        // Buscar detalhes de um Pokémon (tipos e sprite)
        async function fetchPokemonDetails(name) {
            if (pokemonCache.has(name)) return pokemonCache.get(name);
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                const data = await response.json();
                const types = data.types.map(t => t.type.name);
                const sprite = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;
                const details = { types, sprite };
                pokemonCache.set(name, details);
                return details;
            } catch (error) {
                console.error(`Erro ao buscar detalhes de ${name}:`, error);
                return { types: [], sprite: null };
            }
        }

        // Renderizar a Pokédex com scroll infinito (carrega mais itens ao rolar)
        async function renderPokedex() {
            if (!pokedexContainer) return;
            if (isLoading) return;
            isLoading = true;

            const start = currentPage * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const itemsToShow = filteredPokemonNames.slice(start, end);
            if (itemsToShow.length === 0 && currentPage === 0) {
                pokedexContainer.innerHTML = '<div class="loading">Nenhum Pokémon encontrado</div>';
                isLoading = false;
                return;
            }

            // Se for a primeira carga, limpa o container; senão, adiciona ao final
            if (currentPage === 0) {
                pokedexContainer.innerHTML = '<div class="pokedex-grid"></div>';
            }
            const grid = pokedexContainer.querySelector('.pokedex-grid');
            if (!grid) return;

            // Para cada item, cria o card básico (sem sprite e tipos inicialmente, mas já com placeholder)
            for (const name of itemsToShow) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'pokedex-item';
                itemDiv.setAttribute('data-name', name);
                // Placeholder enquanto carrega os detalhes
                itemDiv.innerHTML = `
                    <div class="pokedex-item-sprite">
                        <div style="width:60px;height:60px;background:#0f3460;border-radius:10px;"></div>
                    </div>
                    <div class="pokedex-item-name">${capitalize(name)}</div>
                    <div class="pokedex-item-types">
                        <span class="type-badge">...</span>
                    </div>
                `;
                grid.appendChild(itemDiv);

                // Carrega os detalhes em segundo plano
                fetchPokemonDetails(name).then(details => {
                    // Atualiza o card com os dados reais
                    itemDiv.innerHTML = `
                        <div class="pokedex-item-sprite">
                            ${details.sprite ? `<img src="${details.sprite}" alt="${name}">` : '🐱'}
                        </div>
                        <div class="pokedex-item-name">${capitalize(name)}</div>
                        <div class="pokedex-item-types">
                            ${details.types.map(t => `<span class="type-badge t-${t}" style="font-size:0.35rem;padding:2px 5px;">${t}</span>`).join('')}
                        </div>
                    `;
                }).catch(() => {
                    itemDiv.querySelector('.pokedex-item-types').innerHTML = '<span class="type-badge">?</span>';
                });
                
                // Evento de clique para adicionar ao time
                itemDiv.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (team.length >= 6) {
                        alert('Máximo de 6 Pokémon atingido!');
                        return;
                    }
                    if (team.find(p => p.name === name)) {
                        alert(`${capitalize(name)} já está no time!`);
                        return;
                    }
                    // Busca os tipos (pode estar em cache)
                    const details = await fetchPokemonDetails(name);
                    team.push({
                        name: name,
                        types: details.types,
                        sprite: details.sprite
                    });
                    renderTeam();
                });
            }

            currentPage++;
            isLoading = false;

            // Configurar observer para scroll infinito (carregar mais ao chegar ao fim)
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && filteredPokemonNames.length > currentPage * PAGE_SIZE) {
                    observer.disconnect();
                    renderPokedex();
                }
            }, { threshold: 0.1 });
            const lastChild = grid.lastChild;
            if (lastChild) observer.observe(lastChild);
        }

        // Função para capitalizar nomes
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Renderizar o time na coluna da esquerda
        function renderTeam() {
            if (!teamContainer) return;
            if (team.length === 0) {
                teamContainer.innerHTML = '<div class="loading">Nenhum Pokemon no time</div>';
                return;
            }
            teamContainer.innerHTML = '';
            team.forEach((pokemon, index) => {
                const div = document.createElement('div');
                div.className = 'team-pokemon';
                div.innerHTML = `
                    <div class="team-pokemon-sprite">
                        ${pokemon.sprite ? `<img src="${pokemon.sprite}" alt="${pokemon.name}">` : '🐱'}
                    </div>
                    <div class="team-pokemon-info">
                        <div class="team-pokemon-name">${capitalize(pokemon.name)}</div>
                        <div class="team-pokemon-types">
                            ${pokemon.types.map(t => `<span class="type-badge t-${t}">${t}</span>`).join('')}
                        </div>
                    </div>
                    <button class="remove-btn" data-index="${index}">REMOVER</button>
                `;
                teamContainer.appendChild(div);
            });
            // Reatribuir eventos de remoção
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    team.splice(idx, 1);
                    renderTeam();
                });
            });
        }

        // Filtrar Pokédex conforme texto da busca
        function filterPokedex() {
            const searchTerm = searchInput.value.toLowerCase();
            currentFilter = searchTerm;
            if (searchTerm === '') {
                filteredPokemonNames = [...allPokemonNames];
            } else {
                filteredPokemonNames = allPokemonNames.filter(name => name.includes(searchTerm));
            }
            // Resetar paginação
            currentPage = 0;
            // Limpar grid atual
            if (pokedexContainer) {
                pokedexContainer.innerHTML = '<div class="loading">Carregando...</div>';
            }
            renderPokedex();
        }

        // Exibir resultados da análise (mesmo código do frontend anterior, adaptado)
        function displayResults(data) {
            if (!resultsDiv) return;
            if (!data.frAnalysis) {
                resultsDiv.innerHTML = `<div class="error">Erro ao analisar time</div>`;
                return;
            }
            const analysis = data.frAnalysis;
            const coverageScore = (analysis.coverageScore * 100).toFixed(1);
            const uncoveredTypes = analysis.uncoveredTypes || [];
            
            let html = `
                <div class="coverage-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <div class="coverage-score">${coverageScore}%</div>
                            <div style="font-size:0.4rem;">COBERTURA DO TIME</div>
                        </div>
                        <div style="font-size:0.4rem;">${uncoveredTypes.length === 0 ? 'TIME PERFEITO!' : `⚠ ${uncoveredTypes.length} TIPOS DESCOBERTOS`}</div>
                    </div>
                    <div class="coverage-bar">
                        <div class="coverage-fill" style="width:0%;">${coverageScore}%</div>
                    </div>
                </div>
            `;
            setTimeout(() => {
                const fill = document.querySelector('.coverage-fill');
                if (fill) fill.style.width = `${coverageScore}%`;
            }, 100);
            
            const members = analysis.membersAnalysis || [];
            for (const member of members) {
                const pokemon = member.maPokemon;
                const weaknesses = member.maWeaknesses || [];
                const resistances = member.maResistances || [];
                // Buscar sprite do cache (ou do time)
                let spriteUrl = null;
                const cached = pokemonCache.get(pokemon.name);
                if (cached && cached.sprite) spriteUrl = cached.sprite;
                else {
                    const inTeam = team.find(p => p.name === pokemon.name);
                    if (inTeam && inTeam.sprite) spriteUrl = inTeam.sprite;
                }
                html += `
                    <div class="pokemon-result">
                        <div class="pokemon-result-header">
                            <div class="pokemon-result-sprite">
                                ${spriteUrl ? `<img src="${spriteUrl}" alt="${pokemon.name}">` : '🐱'}
                            </div>
                            <div>
                                <div style="font-size:0.5rem;color:#fdd835;">${capitalize(pokemon.name)}</div>
                                <div class="team-pokemon-types">
                                    ${pokemon.types.map(t => `<span class="type-badge t-${t}">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div style="margin-top:10px;">
                            <div style="font-size:0.4rem;color:#fdd835;">FRAQUEZAS</div>
                            <div class="damage-types">
                                ${weaknesses.map(w => `<span class="type-badge t-${w.drType}">${w.drType} ${w.drMultiplier}x</span>`).join('')}
                                ${weaknesses.length === 0 ? '<span>Nenhuma</span>' : ''}
                            </div>
                        </div>
                        <div style="margin-top:10px;">
                            <div style="font-size:0.4rem;color:#fdd835;">RESISTENCIAS</div>
                            <div class="damage-types">
                                ${resistances.map(r => `<span class="type-badge t-${r.drType}">${r.drType} ${r.drMultiplier}x</span>`).join('')}
                                ${resistances.length === 0 ? '<span>Nenhuma</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
            if (data.frSuggestion) {
                const sug = data.frSuggestion;
                html += `
                    <div class="suggestion-card">
                        <div style="font-size:0.5rem;margin-bottom:10px;">SUGESTAO DE NOVO MEMBRO</div>
                        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                            <span class="type-badge t-${sug.suggestedType}" style="font-size:0.6rem;padding:8px 15px;">${sug.suggestedType.toUpperCase()}</span>
                            <div>
                                <div style="font-size:0.4rem;">${sug.reason}</div>
                                <div style="font-size:0.35rem;margin-top:5px;">EXEMPLOS: ${sug.examplePokemon.join(', ')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            resultsDiv.innerHTML = html;
        }

        // Eventos principais
        document.addEventListener('DOMContentLoaded', () => {
            loadPokemonList();
            renderTeam();
            
            searchInput.addEventListener('input', () => {
                filterPokedex();
            });
            
            clearTeamBtn.addEventListener('click', () => {
                team = [];
                renderTeam();
                resultsDiv.innerHTML = '<div class="loading">TIME LIMPO! CLIQUE EM ANALISAR</div>';
            });
            
            analyzeBtn.addEventListener('click', async () => {
                if (team.length === 0) {
                    alert('Adicione pelo menos um Pokemon ao time!');
                    return;
                }
                resultsDiv.innerHTML = '<div class="loading">ANALISANDO TIME...</div>';
                const teamData = team.map(p => ({ name: p.name, types: p.types }));
                try {
                    const response = await fetch('/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ team: teamData })
                    });
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error || `HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    displayResults(data);
                } catch (error) {
                    resultsDiv.innerHTML = `<div class="error">ERRO: ${error.message}</div>`;
                }
            });
        });
    </script>
</body>
</html>
